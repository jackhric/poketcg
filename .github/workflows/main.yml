name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Checkout rgbds
        uses: actions/checkout@master
        with:
          path: rgbds
          ref: v1.0.0
          repository: gbdev/rgbds

      - name: Install rgbds
        working-directory: rgbds
        run: |
          sudo apt-get update
          sudo apt-get install -yq libpng-dev
          sudo make -j$(nproc) install
      - name: Remove rgbds
        run: |
          rm -rf rgbds
      - name: Compare
        if: ${{ github.repository_owner == 'pret' }}
        run: |
          make DEBUG=1 -j$(nproc) compare
          if ! git diff-index --quiet HEAD --; then
            echo 'Uncommitted changes detected:'
            git diff-index HEAD --
            return 1
          fi
      - name: Make
        if: ${{ github.repository_owner != 'pret' }}
        run: |
          # Build the ROM without the SHA1 'compare' step, since this is
          # a ROM hack and the binary is intentionally different from vanilla.
          make poketcg.gbc -j$(nproc)
          if ! git diff-index --quiet HEAD --; then
            echo 'Uncommitted changes detected:'
            git diff-index HEAD --
            return 1
          fi

      - name: Upload ROM artifact
        if: ${{ github.repository_owner != 'pret' }}
        uses: actions/upload-artifact@v4
        with:
          name: poketcg-${{ github.sha }}
          path: |
            poketcg.gbc
            poketcg.sym
            poketcg.map
          if-no-files-found: error
          retention-days: 30
      - name: Publish release
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository_owner != 'pret' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: |
            Automated ROM hack build from master.

            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
          files: |
            poketcg.gbc
            poketcg.sym
            poketcg.map
          fail_on_unmatched_files: true
      - name: Checkout symbols
        if: ${{ github.event_name == 'push' && github.repository_owner == 'pret' }}
        uses: actions/checkout@master
        with:
          path: symbols
          ref: symbols

      - name: Move symbols
        if: ${{ github.event_name == 'push' && github.repository_owner == 'pret' }}
        run: |
          cp -v *.sym symbols/
      - name: Update symbols
        if: ${{ github.event_name == 'push' && github.repository_owner == 'pret' }}
        uses: EndBug/add-and-commit@v7
        with:
          branch: symbols
          cwd: "./symbols"
          add: "*.sym"
          message: ${{ github.event.commits[0].message }}
